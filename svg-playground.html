<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SVG Split Preview</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: sans-serif;
  }

  .container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* Left side editor */
  .left {
    flex: 1;
    border-right: 1px solid #ccc;
    display: flex;
  }

  textarea {
    width: 100%;
    height: 100%;
    border: none;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
    resize: none;
  }

  /* Right side */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .renders {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    overflow: auto;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Split top pane vertically */
  .pane.split {
    flex-direction: row;
  }

  .subpane {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .subpane.white {
    background: #fff;
  }

  .subpane.black {
    background: #000;
  }

  .pane:last-child {
    border-bottom: none;
  }

  .pane svg {
    max-width: 100%;
    max-height: 100%;
  }

  /* Slider area */
  .slider-wrap {
    border-top: 1px solid #ccc;
    padding: 8px;
    background: #f7f7f7;
  }

  input[type="range"] {
    width: 100%;
  }
</style>
</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <textarea id="svgInput" placeholder="Paste SVG here..."></textarea>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="renders">
      <div class="pane split" id="pane1">
        <div class="subpane white" id="pane1a"></div>
        <div class="subpane black" id="pane1b"></div>
      </div>
      <div class="pane" id="pane2"></div>
    </div>

    <div class="slider-wrap">
      <input id="slider" type="range" min="0" max="100" value="50">
    </div>

  </div>
</div>

<script>
const textarea = document.getElementById('svgInput');
const pane1 = document.getElementById('pane1');
const pane1a = document.getElementById('pane1a');
const pane1b = document.getElementById('pane1b');
const pane2 = document.getElementById('pane2');
const slider = document.getElementById('slider');

function render() {
  const svg = textarea.value.trim();

  pane1a.innerHTML = svg;
  pane1b.innerHTML = svg;
  pane2.innerHTML = svg;
  updateSizes();
}

// Ctrl+Enter to render
textarea.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    render();
  }
});

// Slider controls inverse sizing
function updateSizes() {
  const v = Number(slider.value);

  pane1.style.flex = v;
  pane2.style.flex = 100 - v;
  // Map slider (0–100) to zoom (0.2–2)
  const scale1 = Math.max(0.2, v / 50);
  const scale2 = Math.max(0.2, (100 - v) / 50);

  const svg1a = pane1a.querySelector('svg');
  const svg1b = pane1b.querySelector('svg');
  const svg2 = pane2.querySelector('svg');

  if (svg1a) {
    svg1a.style.transform = `scale(${scale1})`;
    svg1a.style.transformOrigin = "center";
  }

  if (svg1b) {
    svg1b.style.transform = `scale(${scale1})`;
    svg1b.style.transformOrigin = "center";
  }

  if (svg2) {
    svg2.style.transform = `scale(${scale2})`;
    svg2.style.transformOrigin = "center";
  }
}

slider.addEventListener('input', updateSizes);

// init
updateSizes();
</script>

</body>
</html>
